<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DLCs - ETS2 Trucker Advisor</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="container">
    <header>
      <div class="header-title">
        <h1>ETS2 Trucker Advisor</h1>
        <p class="subtitle">Optimize your trailer fleet for each garage</p>
      </div>
      <nav>
        <a href="index.html">Rankings</a>
        <a href="cities.html">Cities</a>
        <a href="companies.html">Companies</a>
        <a href="cargo.html">Cargo</a>
        <a href="trailers.html">Trailers</a>
        <a href="dlcs.html" class="active">DLCs</a>
      </nav>
    </header>

    <main id="main-content">
    <div id="dlc-settings" aria-live="polite">
      <div class="loading" role="status">Loading DLC settings...</div>
    </div>

    <div id="dlc-value-section" style="display: none;">
      <div class="section-header">
        <h2>DLC Value Analysis</h2>
        <button id="calc-value-btn" class="calc-btn">Calculate Marginal Value</button>
      </div>
      <p class="dlc-value-hint">Shows how much fleet EV each unowned DLC would add. Requires at least one owned garage.</p>
      <div id="dlc-value-progress" role="status" aria-live="polite" style="display: none;"></div>
      <div id="dlc-value-results" aria-live="polite"></div>
    </div>
    </main>
  </div>

  <script type="module" src="/src/frontend/dlcs.ts"></script>
</body>
</html>
