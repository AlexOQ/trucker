<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Companies - ETS2 Trucker Advisor</title>
  <link rel="stylesheet" href="css/style.css">
  <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/trucker/sw.js');</script>
  <script>(function(){var t=localStorage.getItem('ets2-theme');if(!t)t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t)})()</script>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="container">
    <header>
      <div class="header-title">
        <h1>ETS2 Trucker Advisor</h1>
        <p class="subtitle">Optimize your trailer fleet for each garage</p>
      </div>
      <nav>
        <a href="index.html">Rankings</a>
        <a href="cities.html">Cities</a>
        <a href="companies.html" class="active">Companies</a>
        <a href="cargo.html">Cargo</a>
        <a href="trailers.html">Trailers</a>
        <a href="dlcs.html">DLCs</a>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light theme" title="Toggle theme"></button>
      </nav>
    </header>

    <main id="main-content">
    <div class="search-box">
      <input type="text" id="search" placeholder="Search companies..." aria-label="Search companies">
    </div>

    <div id="content" aria-live="polite">
      <div class="loading" role="status">Loading companies...</div>
    </div>

    <div id="company-detail" style="display: none;">
      <a href="#" class="back-link" id="back-link">← Back to companies</a>
      <div id="detail-content" aria-live="polite"></div>
    </div>
    </main>
  </div>

  <script type="module" src="/src/frontend/companies.ts"></script>
</body>
</html>
