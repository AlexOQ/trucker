<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trailers - ETS2 Trucker Advisor</title>
  <link rel="stylesheet" href="css/style.css">
  <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/trucker/sw.js');</script>
  <script>(function(){var t=localStorage.getItem('trucker-theme')||localStorage.getItem('ets2-theme');if(!t)t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t)})()</script>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="container">
    <header>
      <div class="header-title">
        <h1 id="page-title">Trucker Advisor</h1>
        <p class="subtitle" id="page-subtitle"></p>
      </div>
      <nav id="main-nav" aria-label="Main navigation"></nav>
    </header>

    <main id="main-content">
    <div class="search-box">
      <input type="text" id="search" placeholder="Search trailers..." aria-label="Search trailers">
    </div>

    <div id="content" aria-live="polite">
      <div class="loading" role="status">Loading trailers...</div>
    </div>

    <div id="trailer-detail" style="display: none;">
      <a href="#" class="back-link" id="back-link">&larr; Back to trailers</a>
      <div id="detail-content" aria-live="polite"></div>
    </div>
    </main>
  </div>

  <script type="module" src="/src/frontend/trailers.ts"></script>
</body>
</html>
